<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <form class="m-3">
        <div class="mb-3">
            <label for="login" class="form-label mb-1">Login</label>
            <input type="text" class="form-control" id="login" placeholder="5-20 chars">
        </div>
        <div class="mb-3">
            <label for="pswd" class="form-label mb-1">Password</label>
            <input type="password" class="form-control" id="pswd" placeholder="4-10 chars">
        </div>
        <div class="mb-3">
            <label for="pswdHint" class="form-label mb-1">Password Hint</label>
            <textarea class="form-control" id="pswdHint" rows="2" placeholder="About your password"></textarea>
        </div>
        <button class="btn btn-primary">Sign up</button>
    </form>
</body>

</html>
