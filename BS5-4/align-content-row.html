<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>align-content (row)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        div.flex-row {
            width: 250px;
            height: 180px;
        }
    </style>
</head>
<body class="p-3">
    <h6>align-content-start</h6>
    <div class="d-flex flex-row flex-wrap align-content-start bg-primary p-2 mb-3">
        <div class="p-2 m-2 bg-light">Item 1</div>
        <div class="p-2 m-2 bg-light">Item 2</div>
        <div class="p-2 m-2 bg-light">Item 3</div>
        <div class="p-2 m-2 bg-light">Item 4</div>
        <div class="p-2 m-2 bg-light">Item 5</div>
    </div>

    <h6>align-content-center</h6>
    <div class="d-flex flex-row flex-wrap align-content-center bg-primary p-2 mb-3">
        <div class="p-2 m-2 bg-light">Item 1</div>
        <div class="p-2 m-2 bg-light">Item 2</div>
        <div class="p-2 m-2 bg-light">Item 3</div>
        <div class="p-2 m-2 bg-light">Item 4</div>
        <div class="p-2 m-2 bg-light">Item 5</div>
    </div>

    <h6>align-content-end</h6>
    <div class="d-flex flex-row flex-wrap align-content-end bg-primary p-2 mb-3">
        <div class="p-2 m-2 bg-light">Item 1</div>
        <div class="p-2 m-2 bg-light">Item 2</div>
        <div class="p-2 m-2 bg-light">Item 3</div>
        <div class="p-2 m-2 bg-light">Item 4</div>
        <div class="p-2 m-2 bg-light">Item 5</div>
    </div>

    <h6>align-content-stretch</h6>
    <div class="d-flex flex-row flex-wrap align-content-stretch bg-primary p-2 mb-3">
        <div class="p-2 m-2 bg-light">Item 1</div>
        <div class="p-2 m-2 bg-light">Item 2</div>
        <div class="p-2 m-2 bg-light">Item 3</div>
        <div class="p-2 m-2 bg-light">Item 4</div>
        <div class="p-2 m-2 bg-light">Item 5</div>
    </div>
</body>
</html>
