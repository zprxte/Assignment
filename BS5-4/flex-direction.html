<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-direction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-3">
    <h6>flex-row</h6>
    <div class="d-inline-flex flex-row bg-primary p-2 mb-3">
        <div class="p-2 me-2 bg-light">Item 1</div>
        <div class="p-2 me-2 bg-light">Item 2</div>
        <div class="p-2 me-2 bg-light">Item 3</div>
    </div>

    <h6>flex-row-reverse</h6>
    <div class="d-inline-flex flex-row-reverse bg-primary p-2 mb-4">
        <div class="p-2 me-2 bg-light">Item 1</div>
        <div class="p-2 me-2 bg-light">Item 2</div>
        <div class="p-2 me-2 bg-light">Item 3</div>
    </div>

    <div class="d-flex">
        <div class="me-4">
            <h6>flex-column</h6>
            <div class="d-inline-flex flex-column bg-primary p-2">
                <div class="p-2 mb-2 bg-light">Item 1</div>
                <div class="p-2 mb-2 bg-light">Item 2</div>
                <div class="p-2 mb-2 bg-light">Item 3</div>
            </div>
        </div>

        <div>
            <h6>flex-column-reverse</h6>
            <div class="d-inline-flex flex-column-reverse bg-primary p-2">
                <div class="p-2 mb-2 bg-light">Item 1</div>
                <div class="p-2 mb-2 bg-light">Item 2</div>
                <div class="p-2 mb-2 bg-light">Item 3</div>
            </div>
        </div>
    </div>
</body>
</html>
