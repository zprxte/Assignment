<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>align-self</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        div.flex-row {
            height: 120px;
        }
        div.flex-column {
            width: 180px;
            height: 250px;
        }
    </style>
</head>
<body class="p-3">
    <h6>flex-row</h6>
    <div class="d-flex flex-row bg-primary p-2 mb-3">
        <div class="align-self-start p-2 mx-2 bg-light">start</div>
        <div class="align-self-center p-2 mx-2 bg-light">center</div>
        <div class="align-self-end p-2 mx-2 bg-light">end</div>
        <div class="align-self-stretch p-2 mx-2 bg-light">stretch</div>
    </div>

    <h6>flex-column</h6>
    <div class="d-flex flex-column bg-primary p-2 mb-3">
        <div class="align-self-start p-2 my-2 bg-light">start</div>
        <div class="align-self-center p-2 my-2 bg-light">center</div>
        <div class="align-self-end p-2 my-2 bg-light">end</div>
        <div class="align-self-stretch p-2 my-2 bg-light">stretch</div>
    </div>
</body>
</html>
