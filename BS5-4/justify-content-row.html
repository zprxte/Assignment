<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>justify-content (row)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-3">
    <h6>justify-content-start</h6>
    <div class="d-flex flex-row justify-content-start bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>justify-content-center</h6>
    <div class="d-flex flex-row justify-content-center bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>justify-content-end</h6>
    <div class="d-flex flex-row justify-content-end bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>justify-content-around</h6>
    <div class="d-flex flex-row justify-content-around bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>justify-content-between</h6>
    <div class="d-flex flex-row justify-content-between bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>justify-content-evenly</h6>
    <div class="d-flex flex-row justify-content-evenly bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>
</body>
</html>
