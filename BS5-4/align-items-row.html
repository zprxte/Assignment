<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>align-items (row)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        div.flex-row {
            height: 120px;
        }
    </style>
</head>
<body class="p-3">
    <h6>align-items-start</h6>
    <div class="d-flex flex-row align-items-start bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>align-items-center</h6>
    <div class="d-flex flex-row align-items-center bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>align-items-end</h6>
    <div class="d-flex flex-row align-items-end bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>

    <h6>align-items-stretch</h6>
    <div class="d-flex flex-row align-items-stretch bg-primary p-2 mb-3">
        <div class="p-2 mx-2 bg-light">Item 1</div>
        <div class="p-2 mx-2 bg-light">Item 2</div>
        <div class="p-2 mx-2 bg-light">Item 3</div>
    </div>
</body>
</html>
