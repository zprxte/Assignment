<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-grow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-3">
    <div class="d-flex">
        <div class="me-4">
            <h6>flex-row</h6>
            <div class="d-flex flex-row bg-primary" style="width: 300px">
                <div class="flex-grow-0 p-2 m-2 bg-light text-center">0</div>
                <div class="flex-grow-1 p-2 m-2 bg-light text-center">1</div>
                <div class="flex-grow-0 p-2 m-2 bg-light text-center">0</div>
            </div>
        </div>

        <div>
            <h6>flex-column</h6>
            <div class="d-flex flex-column bg-primary" style="height: 300px;">
                <div class="flex-grow-0 p-2 m-2 bg-light text-center">0</div>
                <div class="flex-grow-1 p-2 m-2 bg-light text-center">1</div>
                <div class="flex-grow-0 p-2 m-2 bg-light text-center">0</div>
            </div>
        </div>
    </div>
</body>
</html>
