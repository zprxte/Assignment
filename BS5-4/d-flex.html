<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d-flex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-3">
    <div class="d-flex bg-primary p-2">
        <div class="p-2 me-2 bg-light">Item 1</div>
        <div class="p-2 me-2 bg-light">Item 2</div>
        <div class="p-2 me-2 bg-light">Item 3</div>
    </div><br>
    <div class="d-inline-flex bg-primary p-2">
        <div class="p-2 me-2 bg-light">Item A</div>
        <div class="p-2 me-2 bg-light">Item B</div>
        <div class="p-2 me-2 bg-light">Item C</div>
    </div>
</body>
</html>
