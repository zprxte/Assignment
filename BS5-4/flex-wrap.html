<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-wrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="p-3">
    <h6>flex-nowrap</h6>
    <div class="d-flex flex-row flex-nowrap bg-primary" style="width: 200px">
        <div class="p-2 m-2 bg-light border text-center">Item 1</div>
        <div class="p-2 m-2 bg-light border text-center">Item 2</div>
        <div class="p-2 m-2 bg-light border text-center">Item 3</div>
        <div class="p-2 m-2 bg-light border text-center">Item 4</div>
        <div class="p-2 m-2 bg-light border text-center">Item 5</div>
    </div><br>

    <h6>flex-wrap</h6>
    <div class="d-flex flex-row flex-wrap bg-primary" style="width: 250px">
        <div class="p-2 m-2 bg-light border text-center">Item A</div>
        <div class="p-2 m-2 bg-light border text-center">Item B</div>
        <div class="p-2 m-2 bg-light border text-center">Item C</div>
        <div class="p-2 m-2 bg-light border text-center">Item D</div>
        <div class="p-2 m-2 bg-light border text-center">Item E</div>
    </div>

    <br><br>

    <div class="d-flex flex-row ">
        <div class="me-5">
            <h6>flex-nowrap<br>(column)</h6>
            <div class="d-inline-flex flex-column flex-nowrap bg-primary" style="height: 200px; width: 180px">
                <div class="p-2 m-2 bg-light border text-center">Item 1</div>
                <div class="p-2 m-2 bg-light border text-center">Item 2</div>
                <div class="p-2 m-2 bg-light border text-center">Item 3</div>
                <div class="p-2 m-2 bg-light border text-center">Item 4</div>
                <div class="p-2 m-2 bg-light border text-center">Item 5</div>
            </div>
        </div>
        <div>
            <h6>flex-wrap<br>(column)</h6>
            <div class="d-inline-flex flex-column flex-wrap bg-primary" style="height: 200px; width: 180px">
                <div class="p-2 m-2 bg-light border text-center">Item A</div>
                <div class="p-2 m-2 bg-light border text-center">Item B</div>
                <div class="p-2 m-2 bg-light border text-center">Item C</div>
                <div class="p-2 m-2 bg-light border text-center">Item D</div>
                <div class="p-2 m-2 bg-light border text-center">Item E</div>
            </div>
        </div>
    </div>
</body>
</html>
