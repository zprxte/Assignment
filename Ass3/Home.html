<!DOCTYPE html>
<!--The lang Attribute-->
<html lang="en">
<head>
 <meta charset = "UTF-8">
 <title>Home Page</title>
 <!--CSS แบบที่ 2-->
 <!--Internal style sheet-->
 <style>
    body{background-color:lightblue;}
    h2{color:yellow; text-align:right; font-size:30px;}
    p{font-family:verdana; font-size:20px; color:red;}
 </style>
 <!--เรียกใช้CSS แบบที่ 3-->
 <link rel = "stylesheet" type="text/css" href = "mystyle.css">
</head>
<body>
<!--The href Attribute-->
 <a href = "https://www.w3schools.com">This is a link</a>
 <br>
<!--The src Attribute-->
 <img src= "picture/pic1.jpg">
 <br>
<!--THe width and height Attributed-->
 <img src="picture/pic1.jpg" width= "500" height = "600">
 <br>
<!--The alt Attribute-->
 <img src = "picture/pic1.jpg" alt = "Image">
 <br>
<!--The stype Attribute-->
 <p style = "color:red"> I am a paragraph </p>
 <br>
<!--The title Attribute-->
 <p title="I'm a tooltip">This is a paragraph</p>
 <br>
<!--<h2> และ <p> ต่อไปนี้จะใช้ Format จาก CSS แบบที่ 2 ข้างต้นที่เป็นแบบ Internal style sheet-->
<!--ส่วน <h3> จะใช้ format จาก CSS แบบที่ 3 ที่เป็น External style sheet จากไฟล์ที่ชื่อ mystyle.css ซึ่งอยู่ใน folder mycss โดยเรียกใช้ผ่านบรรทัดที่ 8-->
 <h2>ยินดีต้อนรับเข้าสู่เว็บไซต์ของฉัน</h2>
 <h3>ข้อมูลส่วนตัว</h3>
 <p>ธนวัฒน์ ตันเจริญกุล</p>
</body>
</html>
