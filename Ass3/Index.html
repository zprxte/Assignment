<!DOCTYPE HTML>
<html lang="en">
<html>
<head>
    <meta charset="UTF-8">
    <title>เว็บไซต์ของฉัน</title>
    <!--External style sheet-->
    <link rel="stylesheet" type="text/css" href="mycss/mystyle.css">
</head>
<!--tag body เรียกใช้ The element Selector-->
<body>
    <!--เรียกใช้ id selector ในส่วนของ tag div ส่วน tag h1 เรียกใช้ Grouping Selector-->
    <div id="div1">
        <h1 style="color: rgb(255, 255, 255); text-align:center; font-size: 70px">แนะนำตนเอง</h1>
    </div>

    <div id="div2"> Test Div 1 <br>
        <marquee scrollamount="20">
            <img src="picture/pic1.jpg"/>&nbsp;&nbsp;&nbsp;
            <img src="picture/pic2.jpg"/>&nbsp;&nbsp;&nbsp;
            <img src="picture/pic3.jpg"/>
        </marquee>
    </div>
    
    <br>
    <br>

    <div id="div3"> Test Div 2 <br>
        <marquee direction="RIGHT" scrollamount="20">
            <img src="picture/pic1.jpg"/>&nbsp;&nbsp;&nbsp;
            <img src="picture/pic2.jpg"/>&nbsp;&nbsp;&nbsp;
            <img src="picture/pic3.jpg"/>
        </marquee>
    </div>

    <!--เรียกใช้ Class Selector ในส่วนของ tag h1 และ p-->
    <h1 class="center">The class Selector: h1</h1>
    <p class="center">The class Selector paragraph</p>



    <!--tag address เรียกใช้ The element Selector-->
    <address>
        written by Thanawat <br>
        Visit us at cs.hcu.ac.th <br>
        Thailand
    </address>
</body>
</html>
