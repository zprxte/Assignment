<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="bootstrap-5.1.0-dist/css/bootstrap.min.css">
    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>
    <title>ButtonGroup</title>
</head>

<body class="p-4">
    <div class="btn-group" role="group">
        <button class="btn btn-danger">Home</button>
        <input type="button" class="btn btn-danger" value="Docs"> <a href="#" class="btn btn-danger"
            data-role="button">Download</a>
    </div>
    <br><br>
    <div class="btn-group-vertical" role="group">
        <button class="btn btn-outline-primary">Home</button>
        <input type="button" class="btn btn-outline-primary" value="Docs"> <a href="#" class="btn btn-outline-primary"
            data-role="button">Download</a>
    </div>
</body>

</html>
