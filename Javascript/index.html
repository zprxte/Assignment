<!DOCTYPE html>
<html lang="th">

<head>

    <title>แบบฝึกหัด JavaScript พื้นฐาน</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        button {
            padding: 5px 10px;

        }

        #output {
            color: blue;
            margin-top: 20px;
            line-height: 1.6;
            font-size: 16px;
        }

</head>

<body>

    <button onclick="showOrderDetails()">สรุปการสั่งซื้อ</button>

    <!-- พื้นที่สำหรับแสดงผล -->
    <div id="output"></div>

    <!-- อ้างอิงไฟล์ JavaScript ภายนอก -->
    <script src="js/main.js"></script>

</html>
