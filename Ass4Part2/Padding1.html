<!DOCTYPE html>
<html>

<head>

    <script src="bootstrap-5.1.0-dist/js/bootstrap.bundle.min.js"></script>
    <title>Padding</title>
    <style>
        div {
            display: inline-block;
        }

</head>

<body class="p-3">

    <div class="border border-dark ps-4">padding: ps-4</div>
    <br><br>
    <div class="border border-dark px-1">padding: px-1</div>
    <div class="border border-dark px-3">padding: px-3</div>
    <div class="border border-dark px-4">padding: px-4</div>
    <br><br>
    <div class="border border-dark px-1 py-1">padding: px-1, py-1</div>
    <div class="border border-dark px-3 py-2">padding: px-3, py-2</div>

</html>
