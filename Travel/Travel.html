<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานที่ท่องเที่ยวภาคกลาง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero-section position-relative">
        <div class="container h-100 d-flex align-items-center">
            <div class="hero-text text-start text-white">
                <h1 class="display-4 fw-bold mb-3">สถานที่ท่องเที่ยวในภาคกลาง</h1>
                <p class="lead fw-light">สัมผัสวิถีชีวิต ประวัติศาสตร์ และธรรมชาติ ใกล้กรุง</p>
            </div>
        </div>
    </header>

    <div class="container my-5 pt-4">
        <div class="row g-4 justify-content-center" id="province-container">
        </div>
    </div>

    <div class="modal fade" id="provinceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body pt-0">
                    <img id="modalImage" src="" alt="Province Image" class="modal-img mb-4 shadow-sm">
                    <div id="modalDescription" style="line-height: 1.6; color: #1c2b41;"></div>
                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
                    <a id="modalLink" href="#" target="_blank" class="btn btn-primary"
                        style="background-color: #1c2b41; border: none;">ไปเว็บไซต์จังหวัด</a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
